{% extends "adminbase.html" %}
{% block content %}
<div class=" container-fluid py-5">
  <div class="  d-flex flex-column flex-md-row justify-content-center align-items-center gap-5 flex-wrap">
    
    <div class="flex-grow-1" style="max-width: 500px; width: 100%;">
      <canvas id="revenueChart"></canvas>
    </div>
    <div class="chart-wrapper">
        <div class="chart">
            <canvas id="spotChart"></canvas>
        </div>
    </div>

  </div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function () {
    const ctx = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: {{ locations | tojson }},
            datasets: [{
                label: 'Revenue',
                data: {{ revenues | tojson }},
                backgroundColor: [
                    'rgba(255, 99, 132, 0.5)',
                    'rgba(54, 162, 235, 0.5)',
                    'rgba(255, 206, 86, 0.5)',
                    'rgba(75, 192, 192, 0.5)',
                    'rgba(153, 102, 255, 0.5)',
                    'rgba(255, 159, 64, 0.5)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Revenue Distribution by Prime Location'
                }
            }
        }
    });

    const lotIds = {{ lotids | tojson }};
    const spotData = {{ spotdetail | tojson }};
    const occupied = spotData.map(s => s[0]);
    const available = spotData.map(s => s[1]);

    const ctx2 = document.getElementById('spotChart').getContext('2d');
    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: lotIds,
            datasets: [
                {
                    label: 'Occupied Spots',
                    data: occupied,
                    backgroundColor: 'rgba(255, 99, 132, 0.7)'
                },
                {
                    label: 'Available Spots',
                    data: available,
                    backgroundColor: 'rgba(75, 192, 192, 0.7)'
                }
            ]
        },
        options: {
            maintainAspectRatio: false,
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Occupied vs Available Spots per Parking Lot'
                }
            },
            scales: {
                x: {
                    title: {
                        display: true,
                        text: 'Parking Lot ID'
                    }
                },
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Number of Spots'
                    }
                }
            }
        }
    });
});
</script>
{% endblock %}
