{% extends "template.html" %}
{% block body %}
<div class="container box signin">
    <div class="heading">
        <h1>Sign In</h1>
    </div>
    <form method="POST" action="{{url_for('main.signin')}}">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input placeholder="Enter your registered email" type="email" class="form-control" id="username" name="username" aria-describedby="emailHelp" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input name="password" type="password" class="form-control" id="password" required>
        </div>
        <div class="mb-3 d-flex justify-content-center">
            <p class="mt-1 mb-1">Don't have an account? <a href="{{url_for('main.signup')}}" style="text-decoration: none; color:blue; ">Sign up</a></p>
        </div>
        <div class=" d-flex justify-content-center"><button type="submit" class="btn signbtn">Sign in</button></div>
        
    </form>
</div>
{% endblock %}
